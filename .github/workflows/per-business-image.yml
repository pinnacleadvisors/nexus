name: Build per-business gateway image

# Builds and pushes ghcr.io/<org>/nexus-business:<slug> to GHCR.
#
# Triggers:
#   - workflow_dispatch (manual run from the Actions tab — recommended for
#     pilots, lets you pick the slug and niche each run)
#   - push to main when services/claude-gateway/** changes (auto-rebuilds
#     all known business images so they pick up base-image updates)
#
# Why CI instead of `docker build` on a laptop:
#   - No local Docker / Docker Desktop install required
#   - Free build minutes on GitHub-hosted runners (2000/month for orgs)
#   - Push uses GITHUB_TOKEN — no PAT to manage, no rotation needed
#   - Same artifact every time regardless of who triggered it
#
# Operator workflow:
#   1. GitHub UI → Actions tab → "Build per-business gateway image" → Run workflow
#   2. Pick slug (e.g. "pilot-creator") and niche (e.g. "creator")
#   3. Wait ~3-5 min, image lands at ghcr.io/<org>/nexus-business:<slug>
#   4. Coolify pulls the image to deploy (see step 4e of pilot-rollout-walkthrough.md)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Business slug (lowercase, hyphenated). Becomes the image tag.'
        required: true
        type: string
      niche:
        description: 'Niche string. Drives the MCP manifest (e.g. "creator", "ad agency", "saas").'
        required: true
        type: string
      mcp_override:
        description: 'Optional. Override MCP_PACKAGES (space-separated). Set to " " (one space) to install nothing beyond Claude CLI base.'
        required: false
        type: string
        default: ''

  push:
    branches: [main]
    paths:
      - 'services/claude-gateway/**'
      - 'lib/businesses/mcp-manifest.ts'

jobs:
  resolve-manifest:
    runs-on: ubuntu-latest
    outputs:
      mcp_packages: ${{ steps.manifest.outputs.mcp_packages }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Resolve MCP manifest from niche
        id: manifest
        run: |
          if [ -n "${{ inputs.mcp_override }}" ] && [ "${{ inputs.mcp_override }}" != " " ]; then
            echo "mcp_packages=${{ inputs.mcp_override }}" >> "$GITHUB_OUTPUT"
            echo "Using override: ${{ inputs.mcp_override }}"
          elif [ "${{ inputs.mcp_override }}" = " " ]; then
            echo "mcp_packages=" >> "$GITHUB_OUTPUT"
            echo "Override blank — installing no MCPs (Claude CLI base only)"
          else
            PKGS=$(node -e "
              const m = require('./lib/businesses/mcp-manifest');
              const r = m.resolveManifest({ niche: '${{ inputs.niche }}' });
              console.log(r.mcps.map(p => p.pkg).join(' '));
            ")
            echo "mcp_packages=$PKGS" >> "$GITHUB_OUTPUT"
            echo "Resolved for niche='${{ inputs.niche }}': $PKGS"
          fi

  build-and-push:
    needs: resolve-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push per-business image
        uses: docker/build-push-action@v5
        with:
          context: services/claude-gateway/
          file: services/claude-gateway/Dockerfile.business
          push: true
          tags: |
            ghcr.io/${{ steps.lc.outputs.owner }}/nexus-business:${{ inputs.slug }}
          build-args: |
            BUSINESS_SLUG=${{ inputs.slug }}
            MCP_PACKAGES=${{ needs.resolve-manifest.outputs.mcp_packages }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            nexus.business.slug=${{ inputs.slug }}
            nexus.mcp.profile=${{ inputs.niche }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Image pushed"
            echo ""
            echo "- **Tag**: \`ghcr.io/${{ steps.lc.outputs.owner }}/nexus-business:${{ inputs.slug }}\`"
            echo "- **MCP packages**: \`${{ needs.resolve-manifest.outputs.mcp_packages || '(none)' }}\`"
            echo "- **Next step**: provision via \`POST /api/businesses/${{ inputs.slug }}/provision\` (see Step 6b of pilot-rollout-walkthrough.md)"
          } >> "$GITHUB_STEP_SUMMARY"
