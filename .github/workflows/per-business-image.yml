name: Build per-business gateway image

# Builds and pushes ghcr.io/<org>/nexus-business:<slug> to GHCR.
#
# Triggers:
#   - workflow_dispatch (manual run from the Actions tab — recommended for
#     pilots, lets you pick the slug and niche each run)
#   - push to main when services/claude-gateway/** changes (auto-rebuilds
#     all known business images so they pick up base-image updates)
#
# Why CI instead of `docker build` on a laptop:
#   - No local Docker / Docker Desktop install required
#   - Free build minutes on GitHub-hosted runners
#   - Push uses GITHUB_TOKEN — no PAT to manage, no rotation needed
#   - Same artifact every time regardless of who triggered it
#
# Operator workflow:
#   1. GitHub UI → Actions tab → "Build per-business gateway image" → Run workflow
#   2. Pick slug (e.g. "pilot-creator") and niche (e.g. "creator")
#   3. mcp_override:
#        - leave empty  → resolve from niche
#        - "none"       → install no MCPs (Claude CLI base only — first pilot)
#        - "<pkgs>"     → use this exact space-separated list
#   4. Wait ~3-5 min, image lands at ghcr.io/<org>/nexus-business:<slug>
#   5. Coolify pulls the image to deploy (see step 4e of pilot-rollout-walkthrough.md)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Business slug (lowercase, hyphenated). Becomes the image tag.'
        required: true
        type: string
      niche:
        description: 'Niche string. Drives the MCP manifest (e.g. "creator", "ad agency", "saas").'
        required: true
        type: string
      mcp_override:
        description: 'Optional. Leave empty to resolve from niche. Type "none" to install no MCPs. Otherwise space-separated package list.'
        required: false
        type: string
        default: ''

  push:
    branches: [main]
    paths:
      - 'services/claude-gateway/**'
      - 'lib/businesses/mcp-manifest.ts'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      # ── Resolve MCP packages ─────────────────────────────────────────────
      # Inputs flow through env vars (NOT inline ${{ }} substitution into the
      # script body) so quoting in the user-supplied value can never break
      # the shell parser. Three branches:
      #   - empty input  → resolve from niche via tsx (TS file imported directly)
      #   - "none"       → install nothing (sentinel for the very first pilot)
      #   - anything else → use as-is
      - name: Resolve MCP packages
        id: manifest
        env:
          MCP_OVERRIDE: ${{ inputs.mcp_override }}
          NICHE:        ${{ inputs.niche }}
        run: |
          set -euo pipefail
          if [ -z "$MCP_OVERRIDE" ]; then
            # No override — resolve from niche. Use npx tsx to import the TS
            # source directly without a build step. The --yes flag auto-installs
            # tsx if it's not in node_modules.
            PKGS="$(npx --yes tsx -e '
              import { resolveManifest } from "./lib/businesses/mcp-manifest";
              const r = resolveManifest({ niche: process.env.NICHE });
              console.log(r.mcps.map(p => p.pkg).join(" "));
            ')"
            echo "Resolved for niche=\"$NICHE\": $PKGS"
          elif [ "$MCP_OVERRIDE" = "none" ]; then
            PKGS=""
            echo "Override 'none' — installing only the Claude CLI base"
          else
            PKGS="$MCP_OVERRIDE"
            echo "Override: $PKGS"
          fi
          echo "mcp_packages=$PKGS" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push per-business image
        uses: docker/build-push-action@v5
        with:
          context: services/claude-gateway/
          file: services/claude-gateway/Dockerfile.business
          push: true
          tags: |
            ghcr.io/${{ steps.lc.outputs.owner }}/nexus-business:${{ inputs.slug }}
          build-args: |
            BUSINESS_SLUG=${{ inputs.slug }}
            MCP_PACKAGES=${{ steps.manifest.outputs.mcp_packages }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            nexus.business.slug=${{ inputs.slug }}
            nexus.mcp.profile=${{ inputs.niche }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Image pushed"
            echo ""
            echo "- **Tag**: \`ghcr.io/${{ steps.lc.outputs.owner }}/nexus-business:${{ inputs.slug }}\`"
            echo "- **MCP packages**: \`${{ steps.manifest.outputs.mcp_packages || '(none)' }}\`"
            echo "- **Next step**: provision via \`POST /api/businesses/${{ inputs.slug }}/provision\` (see Step 6b of pilot-rollout-walkthrough.md)"
          } >> "$GITHUB_STEP_SUMMARY"
